<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT → MP3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --muted: #888;
    --accent: #e53935;
    --accent2: #ff6f6f;
    --green: #00e676;
    --yellow: #ffd740;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 20px 80px;
  }

  /* Ambient glow */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(229,57,53,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 52px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-icon svg { width: 18px; height: 18px; fill: white; }

  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .tagline {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* Input card */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }

  .input-card:focus-within {
    border-color: var(--border2);
  }

  .input-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .url-input:focus {
    border-color: var(--accent);
    background: #1e1e1e;
  }

  .url-input::placeholder { color: #444; }

  .btn-download {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 22px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .btn-download:hover { background: #c62828; }
  .btn-download:active { transform: scale(0.97); }
  .btn-download:disabled { background: #333; color: #555; cursor: not-allowed; transform: none; }

  .btn-download svg { width: 16px; height: 16px; fill: white; }

  /* Quality selector */
  .options-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }

  .quality-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .quality-pill.active {
    background: rgba(229,57,53,0.15);
    border-color: var(--accent);
    color: var(--accent2);
  }

  .quality-label {
    font-size: 11px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #444;
    margin-right: 6px;
  }

  /* Progress card */
  .progress-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    margin-bottom: 20px;
    display: none;
  }

  .progress-card.visible { display: block; }

  .track-header {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .thumb {
    width: 64px; height: 64px;
    border-radius: 10px;
    background: var(--surface2);
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .thumb-placeholder {
    width: 64px; height: 64px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .thumb-placeholder svg { width: 24px; height: 24px; fill: #333; }

  .track-info { flex: 1; min-width: 0; }

  .track-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .track-meta {
    font-size: 12px;
    color: var(--muted);
  }

  .status-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .status-badge.starting { background: rgba(255,215,64,0.12); color: var(--yellow); }
  .status-badge.downloading { background: rgba(229,57,53,0.12); color: var(--accent2); }
  .status-badge.converting { background: rgba(0,230,118,0.1); color: #69f0ae; }
  .status-badge.done { background: rgba(0,230,118,0.15); color: var(--green); }
  .status-badge.error { background: rgba(229,57,53,0.12); color: var(--accent2); }

  /* Progress bar */
  .progress-wrap {
    background: var(--surface2);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
    margin-bottom: 10px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 100px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-fill.done { background: var(--green); }

  .progress-stats {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }

  /* Download button */
  .btn-save {
    width: 100%;
    margin-top: 18px;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-save.visible { display: flex; }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:active { transform: scale(0.98); }
  .btn-save svg { width: 18px; height: 18px; fill: #000; }

  /* History */
  .history-section {
    margin-top: 12px;
  }

  .history-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .history-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .history-item:hover { border-color: var(--border2); }

  .history-item-icon {
    width: 32px; height: 32px;
    background: rgba(229,57,53,0.1);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .history-item-icon svg { width: 14px; height: 14px; fill: var(--accent); }

  .history-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .history-dl svg { width: 14px; height: 14px; fill: var(--muted); }

  /* Error */
  .error-msg {
    font-size: 13px;
    color: var(--accent2);
    margin-top: 12px;
    display: none;
    padding: 10px 14px;
    background: rgba(229,57,53,0.08);
    border-radius: 10px;
  }

  .error-msg.visible { display: block; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .spinner.visible { display: block; }

  /* Wave animation on progress */
  @keyframes pulse-bar {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .progress-fill.loading {
    animation: pulse-bar 1.2s ease infinite;
  }

  /* Tips */
  .tip {
    text-align: center;
    font-size: 12px;
    color: #333;
    margin-top: 40px;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="wrapper">
  
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-2 13V8l6 4-6 4z"/></svg>
      </div>
      <div class="logo-text">YT<span>→</span>MP3</div>
    </div>
    <p class="tagline">วางลิงก์ YouTube · ดาวน์โหลดเป็น MP3</p>
  </header>

  <!-- Input -->
  <div class="input-card">
    <label class="input-label">YouTube URL</label>
    <div class="input-row">
      <input
        type="text"
        class="url-input"
        id="urlInput"
        placeholder="https://youtube.com/watch?v=..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn-download" id="btnDownload" onclick="startDownload()">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        Convert
      </button>
    </div>
    <div class="options-row">
      <span class="quality-label">Quality</span>
      <div class="quality-pill active" onclick="setQuality(this,'320')">320 kbps</div>
      <div class="quality-pill" onclick="setQuality(this,'192')">192 kbps</div>
      <div class="quality-pill" onclick="setQuality(this,'128')">128 kbps</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <!-- Progress -->
  <div class="progress-card" id="progressCard">
    <div class="track-header">
      <div class="thumb-placeholder" id="thumbWrap">
        <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-2 13V8l6 4-6 4z"/></svg>
      </div>
      <div class="track-info">
        <div class="track-title" id="trackTitle">กำลังโหลดข้อมูล...</div>
        <div class="track-meta" id="trackMeta">MP3 · 320 kbps</div>
      </div>
      <div class="status-badge starting" id="statusBadge">Starting</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-stats">
      <span id="progressPercent">0%</span>
      <span id="progressSpeed"></span>
    </div>

    <button class="btn-save" id="btnSave" onclick="saveFile()">
      <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      บันทึก MP3
    </button>
  </div>

  <!-- History -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-label">ดาวน์โหลดล่าสุด</div>
    <div id="historyList"></div>
  </div>

  <p class="tip">
    รองรับ YouTube, YouTube Music<br>
    ใช้ yt-dlp + ffmpeg · คุณภาพสูงสุด 320 kbps
  </p>

</div>

<script>
  const API = 'http://localhost:7860';
  let currentId = null;
  let pollTimer = null;
  let currentFilename = null;
  let selectedQuality = '320';
  let history = JSON.parse(localStorage.getItem('mp3history') || '[]');

  function setQuality(el, q) {
    document.querySelectorAll('.quality-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    selectedQuality = q;
    document.getElementById('trackMeta').textContent = `MP3 · ${q} kbps`;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('visible');
  }

  async function startDownload() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) return showError('กรุณาวางลิงก์ YouTube ก่อนนะครับ');
    if (!url.includes('youtube.com') && !url.includes('youtu.be')) {
      return showError('ลิงก์นี้ไม่ใช่ YouTube ครับ');
    }

    hideError();
    const btn = document.getElementById('btnDownload');
    btn.disabled = true;
    btn.innerHTML = `<div class="spinner visible"></div> กำลังเริ่ม...`;

    try {
      const res = await fetch(`${API}/api/download`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, quality: selectedQuality })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      currentId = data.id;
      currentFilename = null;

      document.getElementById('progressCard').classList.add('visible');
      document.getElementById('btnSave').classList.remove('visible');
      updateStatus('starting', 0);
      pollProgress();
    } catch (e) {
      btn.disabled = false;
      btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Convert`;
      showError('ไม่สามารถเชื่อมต่อ server ได้: ' + e.message);
    }
  }

  function updateStatus(status, percent, speed, eta) {
    const badge = document.getElementById('statusBadge');
    const fill = document.getElementById('progressFill');
    const pct = document.getElementById('progressPercent');
    const spd = document.getElementById('progressSpeed');

    badge.className = 'status-badge ' + status;
    const labels = { starting: 'Starting', downloading: 'Downloading', converting: 'Converting', done: 'Done', error: 'Error' };
    badge.textContent = labels[status] || status;

    fill.style.width = percent + '%';
    pct.textContent = percent + '%';

    if (status === 'downloading') {
      fill.classList.add('loading');
      spd.textContent = (speed || '') + (eta ? ' · ETA ' + eta : '');
    } else {
      fill.classList.remove('loading');
      spd.textContent = '';
    }

    if (status === 'done') {
      fill.classList.add('done');
    }
  }

  function pollProgress() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`${API}/api/progress?id=${currentId}`);
        const d = await res.json();

        if (d.title) {
          document.getElementById('trackTitle').textContent = d.title;
        }

        if (d.thumbnail && !document.querySelector('#thumbWrap img')) {
          const wrap = document.getElementById('thumbWrap');
          wrap.innerHTML = `<img class="thumb" src="${d.thumbnail}" onerror="this.style.display='none'" />`;
        }

        updateStatus(d.status, d.percent || 0, d.speed, d.eta);

        if (d.status === 'done') {
          clearInterval(pollTimer);
          currentFilename = d.filename;
          document.getElementById('btnSave').classList.add('visible');
          restoreBtn();

          if (d.title && d.filename) {
            addHistory(d.title, d.filename);
          }
        } else if (d.status === 'error') {
          clearInterval(pollTimer);
          showError('เกิดข้อผิดพลาด: ' + d.message);
          restoreBtn();
        }
      } catch (e) { /* network hiccup */ }
    }, 800);
  }

  function restoreBtn() {
    const btn = document.getElementById('btnDownload');
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Convert`;
  }

  function saveFile() {
    if (!currentFilename) return;
    const a = document.createElement('a');
    a.href = `${API}/api/file?name=${encodeURIComponent(currentFilename)}`;
    a.download = currentFilename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function addHistory(title, filename) {
    history.unshift({ title, filename, date: Date.now() });
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem('mp3history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) return;
    document.getElementById('historySection').style.display = 'block';
    const list = document.getElementById('historyList');
    list.innerHTML = history.map(h => `
      <div class="history-item" onclick="downloadHistoryFile('${h.filename}')">
        <div class="history-item-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-2 13V8l6 4-6 4z"/></svg>
        </div>
        <span class="history-title">${h.title}</span>
        <div class="history-dl"><svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></div>
      </div>
    `).join('');
  }

  function downloadHistoryFile(filename) {
    const a = document.createElement('a');
    a.href = `${API}/api/file?name=${encodeURIComponent(filename)}`;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // Enter key support
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startDownload();
  });

  // Paste support - auto trigger
  document.getElementById('urlInput').addEventListener('paste', e => {
    setTimeout(() => {
      const val = document.getElementById('urlInput').value.trim();
      if (val.includes('youtube.com') || val.includes('youtu.be')) {
        startDownload();
      }
    }, 100);
  });

  renderHistory();
</script>
</body>
</html>
