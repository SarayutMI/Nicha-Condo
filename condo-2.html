<script>
AOS.init({ duration:700, easing:'ease-out-cubic', once:true, offset:60 });
const mainNav = document.getElementById('mainNav');
window.addEventListener('scroll', () => {
  if (window.scrollY > 60) { mainNav.classList.add('scrolled'); mainNav.style.background = ''; }
  else { mainNav.classList.remove('scrolled'); mainNav.style.background = 'rgba(0,24,48,0.15)'; }
}, { passive:true });
const hamburgerBtn = document.getElementById('hamburgerBtn');
const mobileMenu   = document.getElementById('mobileMenu');
const hb1 = document.getElementById('hb1'), hb2 = document.getElementById('hb2'), hb3 = document.getElementById('hb3');
let menuOpen = false;
function openMenu() {
  menuOpen = true; mobileMenu.classList.remove('hidden-menu'); document.body.style.overflow = 'hidden';
  hamburgerBtn.setAttribute('aria-expanded', 'true');
  hb1.style.transform = 'rotate(45deg) translate(5px,5px)'; hb2.style.opacity = '0'; hb3.style.transform = 'rotate(-45deg) translate(5px,-5px)'; hb3.style.width = '24px';
}
function closeMenu() {
  menuOpen = false; mobileMenu.classList.add('hidden-menu'); document.body.style.overflow = '';
  hamburgerBtn.setAttribute('aria-expanded', 'false');
  hb1.style.transform = ''; hb2.style.opacity = '1'; hb3.style.transform = ''; hb3.style.width = '20px';
}
hamburgerBtn.addEventListener('click', () => menuOpen ? closeMenu() : openMenu());
document.getElementById('menuOverlay').addEventListener('click', closeMenu);
document.querySelectorAll('.mobile-nav-link').forEach(l => l.addEventListener('click', closeMenu));
<\/script>
